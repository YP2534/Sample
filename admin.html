<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Admin | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #d4af37; --secondary: #111; --font-head: 'Playfair Display', serif; --font-body: 'Lato', sans-serif; }
        body { background-color: #f0f2f5; font-family: var(--font-body); margin: 0; }
        nav { background: var(--secondary); padding: 20px 5vw; display: flex; justify-content: space-between; color: white; }
        nav a { color: var(--primary); text-decoration: none; font-weight: bold; }
        
        .admin-container { max-width: 1000px; margin: 40px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { font-family: var(--font-head); color: var(--secondary); font-size: 2rem; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--secondary); color: var(--primary); font-family: var(--font-head); letter-spacing: 1px; }
        
        /* Premium Login Screen */
        #loginScreen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            position: fixed; top: 0; left: 0; width: 100%; background: rgba(17, 17, 17, 0.98); z-index: 2000;
        }
        .login-box {
            background: #1a1a1a; padding: 50px; border-radius: 8px; text-align: center;
            border: 1px solid #333; box-shadow: 0 15px 40px rgba(0,0,0,0.5); width: 400px;
        }
        .login-box h3 { color: var(--primary); font-family: var(--font-head); font-size: 2rem; margin-bottom: 10px; }
        .login-box input { 
            width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #444; 
            color: var(--primary); border-radius: 4px; text-align: center; font-size: 1.5rem; letter-spacing: 3px; 
        }
        .login-box button {
            width: 100%; padding: 15px; background: var(--primary); color: #111; font-weight: bold;
            border: none; border-radius: 4px; cursor: pointer; font-size: 1.1rem; text-transform: uppercase;
        }
        .error-msg { color: #e74c3c; font-size: 0.9rem; margin-bottom: 15px; display: none; }
        #adminContent { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h3>Master Access</h3>
            <p style="color: #888; margin-bottom: 30px; font-size: 0.95rem;">Enter your 10-digit security authorization code.</p>
            <input type="password" id="pinInput" placeholder="**********" maxlength="10">
            <div id="loginError" class="error-msg">Authorization Denied. Invalid Code.</div>
            <button onclick="checkPin()">Unlock System</button>
            <a href="index.html" style="display: block; margin-top: 30px; color: #666; text-decoration: none;">&larr; Return to Hotel</a>
        </div>
    </div>

    <div id="adminContent">
        <nav>
            <div style="font-family: var(--font-head); font-size: 1.5rem; color: var(--primary);">A S CLUB | DIRECTOR PANEL</div>
            <a href="index.html">Log Out &amp; Lock</a>
        </nav>

        <section>
            <div class="admin-container">
                <h2>Confirmed Reservations</h2>
                <button onclick="clearBookings()" style="padding: 10px 20px; background: #e74c3c; color: white; border: none; cursor: pointer; float: right; margin-bottom: 15px;">Purge Database</button>

                <table>
                    <thead>
                        <tr>
                            <th>Booking ID</th><th>Guest Name</th><th>Check-In</th><th>Check-Out</th><th>Total Price</th><th>Booked On</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // --- UPDATED MASTER PIN ---
        const SECRET_PIN = "6032798248";

        function checkPin() {
            const enteredPin = document.getElementById('pinInput').value;
            if (enteredPin === SECRET_PIN) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadBookings();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('pinInput').value = ''; 
            }
        }

        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPin();
        });

        function loadBookings() {
            const tableBody = document.getElementById('bookingTableBody');
            tableBody.innerHTML = ''; 
            const savedBookings = JSON.parse(localStorage.getItem('hotel_bookings')) || [];

            if (savedBookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color:#888;">No active reservations.</td></tr>';
                return;
            }

            savedBookings.forEach(booking => {
                tableBody.innerHTML += `<tr>
                    <td><strong>${booking.id}</strong></td>
                    <td>${booking.name}</td>
                    <td>${booking.checkIn}</td>
                    <td>${booking.checkOut}</td>
                    <td style="color: #27ae60; font-weight: bold;">${booking.total}</td>
                    <td>${booking.dateBooked}</td>
                </tr>`;
            });
        }

        function clearBookings() {
            if(confirm("DANGER: Delete all reservations permanently?")) {
                localStorage.removeItem('hotel_bookings');
                loadBookings(); 
            }
        }
    </script>

</body>
</html>
