<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Admin | Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #f0f2f5; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--secondary); color: white; }
        tr:hover { background-color: #f5f5f5; }
        .empty-msg { text-align: center; color: #888; padding: 40px; font-style: italic; }

        /* Login Screen Styles */
        #loginScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(26, 26, 26, 0.98);
            z-index: 2000;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 8px; text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); width: 350px;
        }
        .login-box h3 { color: var(--secondary); margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-size: 1.2rem; letter-spacing: 5px; }
        .error-msg { color: red; font-size: 0.9rem; margin-bottom: 15px; display: none; }
        
        /* Hide actual admin content initially */
        #adminContent { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h3>Admin Access</h3>
            <p style="color: #666; margin-bottom: 20px; font-size: 0.9rem;">Enter your 4-digit PIN to access reservations.</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4">
            <div id="loginError" class="error-msg">Incorrect PIN. Try again.</div>
            <button class="btn" onclick="checkPin()" style="width: 100%;">Unlock Panel</button>
            <a href="index.html" style="display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem;">&larr; Back to Website</a>
        </div>
    </div>

    <div id="adminContent">
        <nav>
            <div class="logo">Hotel A S Club - Admin</div>
            <div class="nav-links">
                <a href="index.html">Log Out (Back to Site)</a>
            </div>
        </nav>

        <section style="padding-top: 120px;">
            <div class="admin-container">
                <h2 style="color: var(--secondary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px;">Current Reservations</h2>
                
                <button onclick="clearBookings()" style="padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; float: right; margin-bottom: 15px; transition: 0.3s;">Clear All Data</button>

                <table>
                    <thead>
                        <tr>
                            <th>Booking ID</th>
                            <th>Guest Name</th>
                            <th>Check-In</th>
                            <th>Check-Out</th>
                            <th>Total Price</th>
                            <th>Booked On</th>
                        </tr>
                    </thead>
                    <tbody id="bookingTableBody">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // --- SECURITY LOGIC ---
        const SECRET_PIN = "1234"; // You can change your password here!

        function checkPin() {
            const enteredPin = document.getElementById('pinInput').value;
            if (enteredPin === SECRET_PIN) {
                // Success: Hide login screen, show admin panel, load data
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadBookings();
            } else {
                // Fail: Show error
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('pinInput').value = ''; // clear the box
            }
        }

        // Allow pressing "Enter" to submit PIN
        document.getElementById('pinInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPin();
        });

        // --- DATABASE LOGIC ---
        function loadBookings() {
            const tableBody = document.getElementById('bookingTableBody');
            tableBody.innerHTML = ''; 

            const savedBookings = JSON.parse(localStorage.getItem('hotel_bookings')) || [];

            if (savedBookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="empty-msg">No bookings found. Wait for a guest to book!</td></tr>';
                return;
            }

            savedBookings.forEach(booking => {
                const row = `<tr>
                    <td><strong>${booking.id}</strong></td>
                    <td>${booking.name}</td>
                    <td>${booking.checkIn}</td>
                    <td>${booking.checkOut}</td>
                    <td style="color: #27ae60; font-weight: bold;">${booking.total}</td>
                    <td>${booking.dateBooked}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        function clearBookings() {
            if(confirm("DANGER: Are you sure you want to delete all reservations? This cannot be undone.")) {
                localStorage.removeItem('hotel_bookings');
                loadBookings(); // Refresh the table
            }
        }
    </script>

</body>
</html>
