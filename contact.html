<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel A S Club | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .contact-info h3 { color: var(--primary); margin-bottom: 20px; font-size: 1.8rem; }
        .contact-info p { margin-bottom: 15px; font-size: 1.1rem; }
        .map-container iframe { width: 100%; height: 400px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Hotel A S Club</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="rooms.html">Rooms</a>
            <a href="banquets.html">Banquets</a>
            <a href="book.html" class="btn" style="padding: 8px 20px;">Book Now</a>
        </div>
    </nav>

    <header class="page-header" style="--bg-image: url('https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=1920&q=80');">
        <h1>Get in Touch</h1>
    </header>

    <section>
        <div class="contact-grid">
            <div class="contact-info">
                <h3>Our Location</h3>
                <p>📍 <strong>Address:</strong> 6 K.M. Stone, Nagar Road, Near Chordia Petrol Pump, MIDC Waluj, Chhatrapati Sambhajinagar, Maharashtra 431136</p>
                <p>📞 <strong>Phone:</strong> +91 99210 55558</p>
                <p>✉️ <strong>Email:</strong> info@hotelASclub.com</p>
                
                <h3 style="margin-top: 40px;">Send a Message</h3>
                <input type="text" placeholder="Your Name" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc;">
                <textarea placeholder="How can we help?" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; height: 100px;"></textarea>
                <button class="btn">Send Message</button>
            </div>
            
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3752.686884699042!2d75.2536833!3d19.8529237!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bdba28b122c7a21%3A0xc6fb0e071c667bc9!2sMIDC%20Waluj!5e0!3m2!1sen!2sin!4v1690000000000!5m2!1sen!2sin" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </section>

</body>
</html>
